server:
  port: 8083

spring:
  application:
    name: account-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:SYS}
    password: ${SPRING_DATASOURCE_PASSWORD:12345678}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-properties: internal_logon=sysdba
      connection-timeout: 30000
      maximum-pool-size: 5
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: INFO
    com.banking: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
